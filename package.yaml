name: curtail
version: 0.1.0.0
ghc-options:
  - -Wall
  - -Werror
  - -fno-warn-unused-do-bind

library:
  source-dirs: src
  exposed-modules:
    - Api
    - Config
    - Db
    - Handlers
    - Types
  dependencies:
    - base >= 4.16
    - servant >= 0.19.1
    - servant-server >= 0.19.1
    - warp
    - persistent
    - persistent-sqlite
    - persistent-template
    - monad-logger
    - aeson
    - text
    - time
    - random
    - envy
    - transformers
    - mtl
    - http-types
    - wai
    - exceptions

executables:
  curtail-exe:
    main: Main.hs
    source-dirs: src
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - curtail
      - base >= 4.16
      - servant
      - servant-server
      - warp
      - persistent
      - persistent-sqlite
      - persistent-template
      - monad-logger
      - aeson
      - text
      - time
      - random
      - envy
      - transformers
      - mtl
      - http-types
      - wai
      - exceptions
